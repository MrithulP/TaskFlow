<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img">
  <title>Taskflow logo</title>
  <desc>Taskflow task manager logo</desc>

  <defs>
    <style>
      .wm  { font-family:'Playfair Display',Georgia,serif; font-size:56px; font-weight:800; fill:#0f0f11; letter-spacing:-1.5px; }
      .sub { font-family:'DM Sans',Arial,sans-serif; font-size:11.5px; font-weight:600; fill:#9b9aab; letter-spacing:5px; }
    </style>
  </defs>

  <!-- Amber badge -->
  <rect x="55" y="50" width="170" height="170" rx="32" fill="#e8c547"/>

  <!-- Row 1 — completed -->
  <circle cx="98" cy="110" r="13" fill="#0f0f11" opacity="0.85"/>
  <polyline points="91,110 96,116 106,103" fill="none" stroke="#e8c547" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="122" y1="107" x2="196" y2="107" stroke="#0f0f11" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="122" y1="113" x2="196" y2="113" stroke="#0f0f11" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Row 2 — completed -->
  <circle cx="98" cy="150" r="13" fill="#0f0f11" opacity="0.85"/>
  <polyline points="91,150 96,156 106,143" fill="none" stroke="#e8c547" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="122" y1="147" x2="188" y2="147" stroke="#0f0f11" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="122" y1="153" x2="188" y2="153" stroke="#0f0f11" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Row 3 — pending -->
  <circle cx="98" cy="190" r="13" fill="none" stroke="#0f0f11" stroke-width="2.5" opacity="0.5"/>
  <line x1="122" y1="190" x2="200" y2="190" stroke="#0f0f11" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="122" y1="197" x2="168" y2="197" stroke="#0f0f11" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="258" y="148" class="wm">Taskflow</text>

  <!-- Divider -->
  <line x1="258" y1="168" x2="610" y2="168" stroke="#e2e2e8" stroke-width="1"/>

  <!-- Tagline -->
  <text x="260" y="188" class="sub">TASK MANAGER</text>
</svg>
