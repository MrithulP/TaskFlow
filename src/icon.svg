<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img">
  <title>Taskflow icon</title>
  <desc>Taskflow icon — checklist mark on amber background</desc>

  <!-- Outer badge -->
  <rect width="512" height="512" rx="100" fill="#e8c547"/>

  <!-- Row 1 — completed -->
  <circle cx="152" cy="168" r="44" fill="#0f0f11" opacity="0.88"/>
  <polyline points="134,168 148,184 172,148" fill="none" stroke="#e8c547" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="218" y1="160" x2="368" y2="160" stroke="#0f0f11" stroke-width="9" stroke-linecap="round" opacity="0.3"/>
  <line x1="218" y1="176" x2="368" y2="176" stroke="#0f0f11" stroke-width="9" stroke-linecap="round" opacity="0.3"/>

  <!-- Row 2 — completed -->
  <circle cx="152" cy="282" r="44" fill="#0f0f11" opacity="0.88"/>
  <polyline points="134,282 148,298 172,262" fill="none" stroke="#e8c547" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="218" y1="274" x2="350" y2="274" stroke="#0f0f11" stroke-width="9" stroke-linecap="round" opacity="0.3"/>
  <line x1="218" y1="290" x2="350" y2="290" stroke="#0f0f11" stroke-width="9" stroke-linecap="round" opacity="0.3"/>

  <!-- Row 3 — pending -->
  <circle cx="152" cy="396" r="44" fill="none" stroke="#0f0f11" stroke-width="9" opacity="0.5"/>
  <line x1="218" y1="396" x2="372" y2="396" stroke="#0f0f11" stroke-width="9" stroke-linecap="round" opacity="0.7"/>
  <line x1="218" y1="414" x2="308" y2="414" stroke="#0f0f11" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
